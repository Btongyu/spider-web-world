<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js：慢速非复原吹走粒子 (黄色水瓶版)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #010101; }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 基础打光，保留静止时的贴图质感
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
        dirLight.position.set(10, 15, 10);
        scene.add(dirLight);

        const modelGroup = new THREE.Group();
        scene.add(modelGroup);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(-1000, -1000);
        let targetProgress = 0; 
        let currentProgress = 0; 
        let hasDissipated = false; // 标志位：物体是否已消散

        // 全局时间与进度
        const globalUniforms = {
            uProgress: { value: 0 },
            uMaxProgressSeen: { value: 0 }, 
            uTime: { value: 0 },
            uColor: { value: new THREE.Color(0xffcc00) } // 黄色发光
        };

        window.addEventListener('pointermove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        const loader = new GLTFLoader();
        loader.load('./水瓶.glb', (gltf) => {
            gltf.scene.scale.set(1.5, 1.5, 1.5); 

            // 计算包围盒和轴范围（用于消散时序和属性设置）
            const box = new THREE.Box3().setFromObject(gltf.scene);
            const size = new THREE.Vector3();
            box.getSize(size);
            const minY = box.min.y;
            const maxY = box.max.y;
            const minX = box.min.x;
            const maxX = box.max.x;

            const center = new THREE.Vector3();
            box.getCenter(center);
            gltf.scene.position.sub(center); // 居中模型

            // 用于粒子采样的数组
            const sampledVertices = [];
            const sampledYPercents = [];
            const sampledXPercents = [];

            gltf.scene.traverse((child) => {
                if (child.isMesh) {
                    if (child.geometry.index) child.geometry = child.geometry.toNonIndexed();

                    const posAttr = child.geometry.attributes.position;
                    const count = posAttr.count;
                    const yPercents = new Float32Array(count);
                    const xPercents = new Float32Array(count);

                    for (let i = 0; i < count; i++) {
                        const v = new THREE.Vector3().fromBufferAttribute(posAttr, i);
                        child.localToWorld(v); // 关键：转为世界坐标进行采样和属性计算

                        // 计算顶点在 Y 和 X 轴的比例（从下往上，从左往右）
                        yPercents[i] = (v.y - minY) / size.y;
                        xPercents[i] = (v.x - minX) / size.x;

                        // 粒子采样：大幅减少数量，解决卡顿
                        if (Math.random() < 0.002) { // 0.2% 的顶点，你可以根据需要调整采样率
                            sampledVertices.push(v.x, v.y, v.z);
                            sampledYPercents.push(yPercents[i]);
                            sampledXPercents.push(xPercents[i]);
                        }
                    }
                    child.geometry.setAttribute('aYPercent', new THREE.BufferAttribute(yPercents, 1));
                    child.geometry.setAttribute('aXPercent', new THREE.BufferAttribute(xPercents, 1));

                    child.material = child.material.clone();
                    child.material.transparent = true;
                    child.material.side = THREE.DoubleSide;
                    child.material.blending = THREE.AdditiveBlending; 
                    child.material.depthWrite = false;

                    child.material.onBeforeCompile = (shader) => {
                        shader.uniforms.uProgress = globalUniforms.uProgress;
                        shader.uniforms.uColor = globalUniforms.uColor;
                        
                        shader.vertexShader = `
                            uniform float uProgress;
                            attribute float aYPercent;
                            attribute float aXPercent;
                            varying float vFinalProgress;
                        ` + shader.vertexShader;

                        shader.vertexShader = shader.vertexShader.replace(
                            '#include <begin_vertex>',
                            `
                            #include <begin_vertex>
                            
                            // Mesh消散时序：结合 X 轴（左向右）和 Y 轴（顶部先消散）
                            // 这个逻辑确保物体从左上角开始“吹”出，保持分解时序
                            float meshDissolveProgress = clamp((uProgress - (aYPercent * 0.6 + aXPercent * 0.4) * 0.95) / 0.05, 0.0, 1.0);
                            vFinalProgress = meshDissolveProgress;

                            // 缩放：缩小消失
                            float scale = mix(1.0, 0.05, meshDissolveProgress);
                            transformed *= scale;

                            // X轴吹走：向右吹出
                            vec3 windDir = vec3(2.5, 0.1, 0.0); // X 方向向右
                            transformed += windDir * meshDissolveProgress;
                            `
                        );

                        shader.fragmentShader = `
                            varying float vFinalProgress;
                            uniform vec3 uColor;
                        ` + shader.fragmentShader;

                        shader.fragmentShader = shader.fragmentShader.replace(
                            '#include <dithering_fragment>',
                            `
                            #include <dithering_fragment>
                            gl_FragColor.rgb = mix(gl_FragColor.rgb, uColor * 2.0, vFinalProgress);
                            // 缩小后消失
                            gl_FragColor.a *= (1.0 - (vFinalProgress * 0.98)); 
                            `
                        );
                    };
                }
            });

            // 创建新的采样 Points 粒子系统 (基于采样点)
            const particleGeometry = new THREE.BufferGeometry();
            particleGeometry.setAttribute('position', new THREE.Float32BufferAttribute(sampledVertices, 3));
            particleGeometry.setAttribute('aYPercent', new THREE.Float32BufferAttribute(sampledYPercents, 1));
            particleGeometry.setAttribute('aXPercent', new THREE.Float32BufferAttribute(sampledXPercents, 1));

            const particleMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uProgress: globalUniforms.uProgress,
                    uColor: globalUniforms.uColor
                },
                vertexShader: `
                    uniform float uProgress;
                    attribute float aYPercent;
                    attribute float aXPercent;
                    varying float vAlpha;
                    
                    void main() {
                        // 粒子分解时序：和 Mesh 保持一致（顶部先分解），向右吹走
                        float decomposeProgress = clamp((uProgress - (aYPercent * 0.6 + aXPercent * 0.4) * 0.95) / 0.05, 0.0, 1.0);
                        
                        // X轴吹走
                        vec3 windDir = vec3(4.5, 0.2, 0.0); // 粒子吹出更远
                        vec3 finalPos = position + windDir * decomposeProgress;
                        
                        vec4 mvPos = modelViewMatrix * vec4(finalPos, 1.0);
                        gl_PointSize = 3.5; // 稍微带一点点粒子大小

                        // 粒子在分解后出现，初始无粒子
                        vAlpha = decomposeProgress;
                        
                        gl_Position = projectionMatrix * mvPos;
                    }
                `,
                fragmentShader: `
                    uniform vec3 uColor;
                    varying float vAlpha;
                    void main() {
                        if (length(gl_PointCoord - vec2(0.5)) > 0.5) discard;
                        gl_FragColor = vec4(uColor, vAlpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            const particles = new THREE.Points(particleGeometry, particleMaterial);
            modelGroup.add(particles);

            const maxDim = Math.max(size.x, size.y) * 1.5;
            if(maxDim > 0) camera.position.z = maxDim * 1.2;

            modelGroup.add(gltf.scene);
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            globalUniforms.uTime.value += delta;

            modelGroup.rotation.y += 0.001; // 稍微旋转，增强风吹质感，但不是整个螺旋式消散

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(modelGroup.children, true);
            
            // 交互不复原逻辑
            if (intersects.length > 0) {
                targetProgress = 1.0;
                hasDissipated = true; // 锁定状态，物体不再复原
            } else if (!hasDissipated) {
                targetProgress = 0.0;
            }
            
            // 保持相对缓慢、有粘滞感的消散速度
            let speed = (targetProgress > currentProgress) ? 0.006 : 0.012;
            currentProgress += (targetProgress - currentProgress) * speed;
            
            globalUniforms.uProgress.value = currentProgress;

            if (currentProgress > globalUniforms.uMaxProgressSeen.value) {
                globalUniforms.uMaxProgressSeen.value = currentProgress;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
