<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js：伴随消散的星尘残留 (精细版)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #010101; }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 基础打光，保留静止时的贴图质感
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
        dirLight.position.set(10, 15, 10);
        scene.add(dirLight);

        const modelGroup = new THREE.Group();
        scene.add(modelGroup);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(-1000, -1000);
        let targetProgress = 0; 
        let currentProgress = 0; 

        // 全局时间与进度
        const globalUniforms = {
            uProgress: { value: 0 },
            uMaxProgressSeen: { value: 0 }, 
            uTime: { value: 0 },
            uPurpleGlowColor: { value: new THREE.Color(0xa822ff) } 
        };

        window.addEventListener('pointermove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // 3D 噪波算法
        const noiseShaderChunk = `
            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
            vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
            float snoise(vec3 v) {
                const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
                const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i  = floor(v + dot(v, C.yyy) );
                vec3 x0 = v - i + dot(i, C.xxx) ;
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min( g.xyz, l.zxy );
                vec3 i2 = max( g.xyz, l.zxy );
                vec3 x1 = x0 - i1 + C.xxx;
                vec3 x2 = x0 - i2 + C.yyy;
                vec3 x3 = x0 - D.yyy;
                i = mod289(i);
                vec4 p = permute( permute( permute( i.z + vec4(0.0, i1.z, i2.z, 1.0 )) + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
                float n_ = 0.142857142857;
                vec3  ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_ );
                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4( x.xy, y.xy );
                vec4 b1 = vec4( x.zw, y.zw );
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
                vec3 p0 = vec3(a0.xy,h.x);
                vec3 p1 = vec3(a0.zw,h.y);
                vec3 p2 = vec3(a1.xy,h.z);
                vec3 p3 = vec3(a1.zw,h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
            }
        `;

        const loader = new GLTFLoader();
        loader.load('./饭盒.glb', (gltf) => {
            gltf.scene.scale.set(1.5, 1.5, 1.5); 

            const box = new THREE.Box3().setFromObject(gltf.scene);
            const center = new THREE.Vector3();
            box.getCenter(center);
            gltf.scene.position.sub(center);

            // 用于存储独立背景残留星尘的数据
            const allDustPositions = [];
            const allDustRandoms = [];
            const allDustDirections = [];
            const allDustSizes = [];

            gltf.scene.traverse((child) => {
                if (child.isMesh) {
                    if (child.geometry.index) child.geometry = child.geometry.toNonIndexed();

                    const posAttr = child.geometry.attributes.position;
                    const count = posAttr.count;
                    const centroids = new Float32Array(count * 3);
                    const randoms = new Float32Array(count); 
                    const permanents = new Float32Array(count); 

                    for (let i = 0; i < count; i += 3) {
                        const v1 = new THREE.Vector3(posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i));
                        const v2 = new THREE.Vector3(posAttr.getX(i+1), posAttr.getY(i+1), posAttr.getZ(i+1));
                        const v3 = new THREE.Vector3(posAttr.getX(i+2), posAttr.getY(i+2), posAttr.getZ(i+2));
                        
                        const currentCenter = new THREE.Vector3().add(v1).add(v2).add(v3).divideScalar(3);
                        const rand = Math.random();

                        const isPermanent = Math.random() < 0.05 ? 1.0 : 0.0; 

                        for (let j = 0; j < 3; j++) {
                            centroids[(i + j) * 3] = currentCenter.x;
                            centroids[(i + j) * 3 + 1] = currentCenter.y;
                            centroids[(i + j) * 3 + 2] = currentCenter.z;
                            randoms[i + j] = rand;
                            permanents[i + j] = isPermanent;
                        }

                        // 生成残留粒子，几率15%
                        if (Math.random() < 0.15) {
                            const offsetX = (Math.random() - 0.5) * 0.3;
                            const offsetY = (Math.random() - 0.5) * 0.3;
                            const offsetZ = (Math.random() - 0.5) * 0.3;

                            allDustPositions.push(
                                currentCenter.x + offsetX, 
                                currentCenter.y + offsetY, 
                                currentCenter.z + offsetZ
                            );
                            allDustRandoms.push(rand); 
                            
                            const dir = new THREE.Vector3(
                                (Math.random() - 0.5),
                                (Math.random() - 0.5),
                                (Math.random() - 0.5)
                            ).normalize().multiplyScalar(Math.random() * 2.0 + 0.8); 
                            
                            allDustDirections.push(dir.x, dir.y, dir.z);

                            // 【修改】粒子生成尺寸调得更小、更精细
                            allDustSizes.push(Math.random() * 0.18 + 0.05); 
                        }
                    }
                    child.geometry.setAttribute('aCentroid', new THREE.BufferAttribute(centroids, 3));
                    child.geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
                    child.geometry.setAttribute('aIsPermanent', new THREE.BufferAttribute(permanents, 1));

                    child.material = child.material.clone();
                    child.material.transparent = true;
                    child.material.side = THREE.DoubleSide;
                    child.material.blending = THREE.AdditiveBlending; 
                    child.material.depthWrite = false;

                    child.material.onBeforeCompile = (shader) => {
                        shader.uniforms.uProgress = globalUniforms.uProgress;
                        shader.uniforms.uMaxProgressSeen = globalUniforms.uMaxProgressSeen; 
                        shader.uniforms.uTime = globalUniforms.uTime;
                        shader.uniforms.uPurpleGlowColor = globalUniforms.uPurpleGlowColor;

                        shader.vertexShader = `
                            uniform float uProgress;
                            uniform float uMaxProgressSeen;
                            uniform float uTime;
                            attribute vec3 aCentroid;
                            attribute float aRandom;
                            attribute float aIsPermanent;
                            varying float vFinalProgress;
                            ${noiseShaderChunk}
                        ` + shader.vertexShader;

                        shader.vertexShader = shader.vertexShader.replace(
                            '#include <begin_vertex>',
                            `
                            #include <begin_vertex>
                            
                            float localDynProgress = clamp((uProgress - aRandom * 0.3) / 0.7, 0.0, 1.0);
                            float dynEaseProgress = localDynProgress * localDynProgress * (3.0 - 2.0 * localDynProgress);

                            float localLockProgress = clamp((uMaxProgressSeen - aRandom * 0.3) / 0.7, 0.0, 1.0);
                            float lockEaseProgress = localLockProgress * localLockProgress * (3.0 - 2.0 * localLockProgress);

                            float mixedEaseProgress = mix(dynEaseProgress, max(dynEaseProgress, lockEaseProgress), aIsPermanent);
                            vFinalProgress = mixedEaseProgress; 

                            float scale = mix(1.0, 0.05, mixedEaseProgress);
                            vec3 centerToVertex = transformed - aCentroid;
                            transformed = aCentroid + centerToVertex * scale;

                            vec3 noisePos = aCentroid * 1.5;
                            
                            // 【核心修改：动态控速】
                            // 当 uProgress 为 1（正在散开）时速度为正常的 0.5；当 uProgress 恢复为 0 时，遗留在空中的残余碎片速度暴跌到 0.015
                            float currentMeshSpeed = mix(0.015, 0.5, uProgress);
                            float timeOffset = uTime * currentMeshSpeed;

                            float nx = snoise(noisePos + vec3(timeOffset, 0.0, 0.0));
                            float ny = snoise(noisePos + vec3(0.0, timeOffset, 0.0));
                            float nz = snoise(noisePos + vec3(0.0, 0.0, timeOffset));
                            
                            vec3 upDir = vec3(0.0, 1.2, 0.0);
                            vec3 displacement = (vec3(nx, ny, nz) * 1.5 + upDir) * mixedEaseProgress * 3.0;
                            transformed += displacement;
                            `
                        );

                        shader.fragmentShader = `
                            varying float vFinalProgress;
                            uniform vec3 uPurpleGlowColor;
                        ` + shader.fragmentShader;

                        shader.fragmentShader = shader.fragmentShader.replace(
                            '#include <dithering_fragment>',
                            `
                            #include <dithering_fragment>
                            vec3 glow = uPurpleGlowColor * 3.0; 
                            gl_FragColor.rgb = mix(gl_FragColor.rgb, glow, vFinalProgress);
                            gl_FragColor.a *= (1.0 - (vFinalProgress * 0.5)); 
                            `
                        );
                    };
                }
            });

            // ==========================================
            // 【伴随型】残留粒子系统 
            // ==========================================
            const dustGeometry = new THREE.BufferGeometry();
            dustGeometry.setAttribute('position', new THREE.Float32BufferAttribute(allDustPositions, 3));
            dustGeometry.setAttribute('aRandom', new THREE.Float32BufferAttribute(allDustRandoms, 1));
            dustGeometry.setAttribute('aDirection', new THREE.Float32BufferAttribute(allDustDirections, 3));
            dustGeometry.setAttribute('aSize', new THREE.Float32BufferAttribute(allDustSizes, 1));

            const dustMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uProgress: globalUniforms.uProgress, // 【新增】将当前鼠标交互状态传入星尘材质
                    uMaxProgressSeen: globalUniforms.uMaxProgressSeen,
                    uTime: globalUniforms.uTime,
                    uColor: { value: new THREE.Color(0xa822ff) } 
                },
                vertexShader: `
                    uniform float uProgress;
                    uniform float uMaxProgressSeen;
                    uniform float uTime;
                    attribute float aRandom;
                    attribute vec3 aDirection;
                    attribute float aSize;
                    varying float vAlpha;
                    
                    ${noiseShaderChunk}

                    void main() {
                        float localProgress = clamp((uMaxProgressSeen - aRandom * 0.3) / 0.7, 0.0, 1.0);
                        float ease = localProgress * localProgress * (3.0 - 2.0 * localProgress);

                        vec3 noisePos = position * 1.5;
                        
                        // 【核心修改：动态控速】
                        // 散开时保持 0.15 正常速度，鼠标离开后留在背景中的星尘速度降为 0.005 的极致慢速
                        float currentDustSpeed = mix(0.005, 0.15, uProgress);
                        float timeOffset = uTime * currentDustSpeed; 

                        float nx = snoise(noisePos + vec3(timeOffset, 0.0, 0.0));
                        float ny = snoise(noisePos + vec3(0.0, timeOffset, 0.0));
                        float nz = snoise(noisePos + vec3(0.0, 0.0, timeOffset));
                        vec3 upDir = vec3(0.0, 1.2, 0.0);
                        vec3 baseDisplacement = (vec3(nx, ny, nz) * 1.5 + upDir) * ease * 3.0;

                        // 自主呼吸漂移感同样跟进度挂钩
                        float currentDriftSpeed = mix(0.01, 0.2, uProgress);
                        vec3 drift = vec3(
                            sin(uTime * currentDriftSpeed + position.y * 2.0),
                            cos(uTime * currentDriftSpeed * 0.8 + position.x * 2.0),
                            sin(uTime * currentDriftSpeed * 1.2 + position.z * 2.0)
                        ) * ease * 0.25;

                        vec3 finalPos = position + baseDisplacement + (aDirection * ease) + drift;
                        vec4 mvPos = modelViewMatrix * vec4(finalPos, 1.0);

                        // 【修改】粒子渲染尺寸调小 (7.0 -> 5.5)
                        gl_PointSize = aSize * (5.5 / -mvPos.z);
                        gl_Position = projectionMatrix * mvPos;

                        // 呼吸闪烁频率同步放缓
                        float currentFlashSpeed = mix(0.08, 1.0, uProgress);
                        vAlpha = ease * (0.3 + 0.4 * sin(uTime * currentFlashSpeed + position.x * 15.0)); 
                    }
                `,
                fragmentShader: `
                    uniform vec3 uColor;
                    varying float vAlpha;
                    void main() {
                        vec2 coord = gl_PointCoord - vec2(0.5);
                        if (abs(coord.x) + abs(coord.y) > 0.5) discard;

                        gl_FragColor = vec4(uColor * 2.0, vAlpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            const dustPoints = new THREE.Points(dustGeometry, dustMaterial);
            modelGroup.add(dustPoints);

            const maxDim = Math.max(box.max.x - box.min.x, box.max.y - box.min.y) * 1.5;
            if(maxDim > 0) camera.position.z = maxDim * 1.2;

            modelGroup.add(gltf.scene);
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            globalUniforms.uTime.value += delta;

            modelGroup.rotation.y += 0.002;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(modelGroup.children, true);
            
            targetProgress = (intersects.length > 0) ? 1.0 : 0.0;
            
            let speed = (targetProgress > currentProgress) ? 0.006 : 0.012;
            currentProgress += (targetProgress - currentProgress) * speed;
            
            globalUniforms.uProgress.value = currentProgress;

            if (currentProgress > globalUniforms.uMaxProgressSeen.value) {
                globalUniforms.uMaxProgressSeen.value = currentProgress;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
